[profile.default]
src = "src"
out = "out"
libs = ["lib"]
ffi = true
ast = true
via_ir = true
build_info = true
extra_output = ["storageLayout"]
evm_version = "paris" # prevent use of PUSH0 opcode until it is widely supported
optimizer = true
optimizer_runs = 200
fs_permissions = [
  { access = "read", path = "./out" },
  { access = "read", path = "./script/env/tokens.json" }
]

[fmt]
line_length = 120
quote_style = "single"
tab_width = 2

[lint]
exclude_lints = ["asm-keccak256"]
ignore = ["test/mocks/*.sol"]

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
